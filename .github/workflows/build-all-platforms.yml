name: Build 6529 Desktop

on:
  workflow_dispatch:
    inputs:
      env:
        description: "Select environment"
        required: true
        type: choice
        options:
          - Staging
          - Production
        default: "Staging"
      version:
        description: "Version to build"
        required: true
        type: string
      flow:
        description: "Flow to run"
        required: true
        default: "Build All"
        type: choice
        options:
          - Build All
          - MacOS
          - Windows
          - Sign Windows
          - Linux
          - Publish
          - Invalidate CloudFront

run-name: "FLOW: ${{ github.event.inputs.flow }} / ENV: ${{ github.event.inputs.env }} - v${{ github.event.inputs.version }}"

jobs:
  build-mac:
    name: MacOS
    uses: ./.github/workflows/build-mac.yml
    with:
      env: ${{ github.event.inputs.env }}
      version: ${{ github.event.inputs.version }}
      should_run: ${{ github.event.inputs.flow == 'Build All' || github.event.inputs.flow == 'MacOS' }}
    secrets: inherit

  build-windows:
    name: Windows
    uses: ./.github/workflows/build-windows.yml
    with:
      env: ${{ github.event.inputs.env }}
      version: ${{ github.event.inputs.version }}
      should_run: ${{ github.event.inputs.flow == 'Build All' || github.event.inputs.flow == 'Windows' }}
    secrets: inherit

  sign-windows:
    name: Sign Windows
    uses: ./.github/workflows/sign-windows.yml
    with:
      env: ${{ github.event.inputs.env }}
      version: ${{ github.event.inputs.version }}
      should_run: ${{ github.event.inputs.flow == 'Sign Windows' }}
    secrets: inherit

  build-linux:
    name: Linux
    uses: ./.github/workflows/build-linux.yml
    with:
      env: ${{ github.event.inputs.env }}
      version: ${{ github.event.inputs.version }}
      should_run: ${{ github.event.inputs.flow == 'Build All' || github.event.inputs.flow == 'Linux' }}
    secrets: inherit

  notify-build-status:
    name: Notify Build Status
    runs-on: ubuntu-latest
    needs: [build-mac, build-windows, build-linux, sign-windows]
    # Run this notifier only for single-platform flows; Build All/Publish are handled by the publish job
    if: ${{ always() && (github.event.inputs.flow == 'MacOS' || github.event.inputs.flow == 'Windows' || github.event.inputs.flow == 'Linux' || github.event.inputs.flow == 'Sign Windows') }}
    steps:
      - name: Check out notification scripts
        uses: actions/checkout@v3
        with:
          ref: ${{ github.ref_name }}

      - name: Set up Node for notifications
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Determine required build status
        run: |
          SHOULD_FAIL=false

          if [[ "${{ github.event.inputs.flow }}" == "MacOS" ]]; then
            [[ "${{ needs.build-mac.result }}" != "success" ]] && SHOULD_FAIL=true
          fi
          if [[ "${{ github.event.inputs.flow }}" == "Windows" ]]; then
            [[ "${{ needs.build-windows.result }}" != "success" ]] && SHOULD_FAIL=true
          fi
          if [[ "${{ github.event.inputs.flow }}" == "Linux" ]]; then
            [[ "${{ needs.build-linux.result }}" != "success" ]] && SHOULD_FAIL=true
          fi
          if [[ "${{ github.event.inputs.flow }}" == "Sign Windows" ]]; then
            [[ "${{ needs.sign-windows.result }}" != "success" ]] && SHOULD_FAIL=true
          fi

          echo "SHOULD_FAIL=$SHOULD_FAIL" >> $GITHUB_ENV

      - name: Notify build failure (single-platform flow)
        if: env.SHOULD_FAIL == 'true'
        uses: sarisia/actions-status-discord@v1
        continue-on-error: true
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        with:
          status: failure
          title: "6529 Desktop - Build failed ❌"
          description: "FLOW: ${{ github.event.inputs.flow }} / ENV: ${{ github.event.inputs.env }} - v${{ github.event.inputs.version }}"
          content: "<@&1162355330798325861>"
          color: 0xff0000

      - name: Notify CI wave about build failure (single-platform flow)
        if: env.SHOULD_FAIL == 'true'
        continue-on-error: true
        env:
          CI_PIPELINES_ALERT_URL: ${{ vars.CI_PIPELINES_ALERT_URL }}
          CI_PIPELINES_ALERT_SECRET: ${{ secrets.CI_PIPELINES_ALERT_SECRET }}
          CI_PIPELINES_ALERT_API_AUTH: ${{ secrets.CI_PIPELINES_ALERT_API_AUTH }}
          CI_PIPELINES_TARGET_ENV: ${{ github.event.inputs.env }}
          CI_PIPELINES_STATUS: failure
          CI_PIPELINES_TITLE: "6529 Desktop - Build failed ❌"
          CI_PIPELINES_DESCRIPTION: "FLOW: ${{ github.event.inputs.flow }} / ENV: ${{ github.event.inputs.env }} - v${{ github.event.inputs.version }}"
          CI_PIPELINES_SERVICE: desktop
        run: node scripts/notify-ci-wave.mjs

      - name: Notify build success (single-platform flow)
        if: env.SHOULD_FAIL != 'true'
        uses: sarisia/actions-status-discord@v1
        continue-on-error: true
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        with:
          status: success
          title: "6529 Desktop - Build Success ✅"
          description: "FLOW: ${{ github.event.inputs.flow }} / ENV: ${{ github.event.inputs.env }} - v${{ github.event.inputs.version }}"
          color: 0x00ff00

      - name: Notify CI wave about build success (single-platform flow)
        if: env.SHOULD_FAIL != 'true'
        continue-on-error: true
        env:
          CI_PIPELINES_ALERT_URL: ${{ vars.CI_PIPELINES_ALERT_URL }}
          CI_PIPELINES_ALERT_SECRET: ${{ secrets.CI_PIPELINES_ALERT_SECRET }}
          CI_PIPELINES_ALERT_API_AUTH: ${{ secrets.CI_PIPELINES_ALERT_API_AUTH }}
          CI_PIPELINES_TARGET_ENV: ${{ github.event.inputs.env }}
          CI_PIPELINES_STATUS: success
          CI_PIPELINES_TITLE: "6529 Desktop - Build Success ✅"
          CI_PIPELINES_DESCRIPTION: "FLOW: ${{ github.event.inputs.flow }} / ENV: ${{ github.event.inputs.env }} - v${{ github.event.inputs.version }}"
          CI_PIPELINES_SERVICE: desktop
        run: node scripts/notify-ci-wave.mjs

  publish:
    if: ${{ github.event.inputs.flow == 'Build All' || github.event.inputs.flow == 'Publish' }}
    name: Publish
    runs-on: ubuntu-latest
    needs: [build-mac, build-windows, build-linux]
    env:
      SEIZE_6529_COMMAND: "1"
    steps:
      - name: Determine required builds status
        run: |
          SHOULD_FAIL=false

          if [[ "${{ github.event.inputs.flow }}" == "Build All" || "${{ github.event.inputs.flow }}" == "MacOS" ]]; then
            [[ "${{ needs.build-mac.result }}" != "success" ]] && SHOULD_FAIL=true
          fi
          if [[ "${{ github.event.inputs.flow }}" == "Build All" || "${{ github.event.inputs.flow }}" == "Windows" ]]; then
            [[ "${{ needs.build-windows.result }}" != "success" ]] && SHOULD_FAIL=true
          fi
          if [[ "${{ github.event.inputs.flow }}" == "Build All" || "${{ github.event.inputs.flow }}" == "Linux" ]]; then
            [[ "${{ needs.build-linux.result }}" != "success" ]] && SHOULD_FAIL=true
          fi

          echo "SHOULD_FAIL=$SHOULD_FAIL" >> $GITHUB_ENV

      - name: Check out
        uses: actions/checkout@v3
        with:
          ref: ${{ github.ref_name }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Notify required build failure
        if: env.SHOULD_FAIL == 'true'
        uses: sarisia/actions-status-discord@v1
        continue-on-error: true
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        with:
          status: failure
          title: "6529 Desktop - Build failed ❌"
          description: "FLOW: ${{ github.event.inputs.flow }} / ENV: ${{ github.event.inputs.env }} - v${{ github.event.inputs.version }}"
          content: "<@&1162355330798325861>"
          color: 0xff0000

      - name: Notify CI wave about required build failure
        if: env.SHOULD_FAIL == 'true'
        continue-on-error: true
        env:
          CI_PIPELINES_ALERT_URL: ${{ vars.CI_PIPELINES_ALERT_URL }}
          CI_PIPELINES_ALERT_SECRET: ${{ secrets.CI_PIPELINES_ALERT_SECRET }}
          CI_PIPELINES_ALERT_API_AUTH: ${{ secrets.CI_PIPELINES_ALERT_API_AUTH }}
          CI_PIPELINES_TARGET_ENV: ${{ github.event.inputs.env }}
          CI_PIPELINES_STATUS: failure
          CI_PIPELINES_TITLE: "6529 Desktop - Build failed ❌"
          CI_PIPELINES_DESCRIPTION: "FLOW: ${{ github.event.inputs.flow }} / ENV: ${{ github.event.inputs.env }} - v${{ github.event.inputs.version }}"
          CI_PIPELINES_SERVICE: desktop
        run: node scripts/notify-ci-wave.mjs

      - name: Install dependencies
        if: env.SHOULD_FAIL != 'true'
        env:
          SEIZE_6529_COMMAND: "1"
          SEIZE_SECURE_INSTALL: "1"
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Configure AWS Credentials
        if: env.SHOULD_FAIL != 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Publish S3 Links
        if: env.SHOULD_FAIL != 'true'
        run: |
          if [ "${{ github.event.inputs.env }}" = "Staging" ]; then
            pnpm run publish-links-staging
          else
            pnpm run publish-links-production
          fi

      - name: Notify Success
        if: success() && env.SHOULD_FAIL != 'true'
        uses: sarisia/actions-status-discord@v1
        continue-on-error: true
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        with:
          status: success
          title: "6529 Desktop - S3 links published ✅"
          description: "FLOW: ${{ github.event.inputs.flow }} / ENV: ${{ github.event.inputs.env }} - v${{ github.event.inputs.version }}"
          color: 0x00bfff

      - name: Notify CI wave about S3 links published
        if: success() && env.SHOULD_FAIL != 'true'
        continue-on-error: true
        env:
          CI_PIPELINES_ALERT_URL: ${{ vars.CI_PIPELINES_ALERT_URL }}
          CI_PIPELINES_ALERT_SECRET: ${{ secrets.CI_PIPELINES_ALERT_SECRET }}
          CI_PIPELINES_ALERT_API_AUTH: ${{ secrets.CI_PIPELINES_ALERT_API_AUTH }}
          CI_PIPELINES_TARGET_ENV: ${{ github.event.inputs.env }}
          CI_PIPELINES_STATUS: success
          CI_PIPELINES_TITLE: "6529 Desktop - S3 links published ✅"
          CI_PIPELINES_DESCRIPTION: "FLOW: ${{ github.event.inputs.flow }} / ENV: ${{ github.event.inputs.env }} - v${{ github.event.inputs.version }}"
          CI_PIPELINES_SERVICE: desktop
        run: node scripts/notify-ci-wave.mjs

      - name: Publish Arweave Links
        if: env.SHOULD_FAIL != 'true' && github.event.inputs.env == 'Production'
        env:
          ARWEAVE_KEY: ${{ secrets.ARWEAVE_KEY }}
        run: pnpm run publish-links-production-arweave

      - name: Invalidate CloudFront
        if: env.SHOULD_FAIL != 'true' && github.event.inputs.env == 'Production'
        run: |
          pnpm run invalidate-cf-paths-production -- --version=${{ github.event.inputs.version }}

      - name: Final Success - After Arweave
        if: success() && env.SHOULD_FAIL != 'true' && github.event.inputs.env == 'Production'
        uses: sarisia/actions-status-discord@v1
        continue-on-error: true
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        with:
          status: success
          title: "6529 Desktop - Build complete 🚀"
          description: "FLOW: ${{ github.event.inputs.flow }} / ENV: ${{ github.event.inputs.env }} - v${{ github.event.inputs.version }}"
          color: 0x00ff00

      - name: Notify CI wave about final production build success
        if: success() && env.SHOULD_FAIL != 'true' && github.event.inputs.env == 'Production'
        continue-on-error: true
        env:
          CI_PIPELINES_ALERT_URL: ${{ vars.CI_PIPELINES_ALERT_URL }}
          CI_PIPELINES_ALERT_SECRET: ${{ secrets.CI_PIPELINES_ALERT_SECRET }}
          CI_PIPELINES_ALERT_API_AUTH: ${{ secrets.CI_PIPELINES_ALERT_API_AUTH }}
          CI_PIPELINES_TARGET_ENV: production
          CI_PIPELINES_STATUS: success
          CI_PIPELINES_TITLE: "6529 Desktop - Build complete 🚀"
          CI_PIPELINES_DESCRIPTION: "FLOW: ${{ github.event.inputs.flow }} / ENV: ${{ github.event.inputs.env }} - v${{ github.event.inputs.version }}"
          CI_PIPELINES_SERVICE: desktop
        run: node scripts/notify-ci-wave.mjs

      - name: Notify Publish Failure
        if: failure()
        uses: sarisia/actions-status-discord@v1
        continue-on-error: true
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        with:
          status: failure
          title: "6529 Desktop - Publish job failed ❌"
          description: "FLOW: ${{ github.event.inputs.flow }} / ENV: ${{ github.event.inputs.env }} - v${{ github.event.inputs.version }}"
          content: "<@&1162355330798325861>"
          color: 0xff0000

      - name: Notify CI wave about publish failure
        if: failure()
        continue-on-error: true
        env:
          CI_PIPELINES_ALERT_URL: ${{ vars.CI_PIPELINES_ALERT_URL }}
          CI_PIPELINES_ALERT_SECRET: ${{ secrets.CI_PIPELINES_ALERT_SECRET }}
          CI_PIPELINES_ALERT_API_AUTH: ${{ secrets.CI_PIPELINES_ALERT_API_AUTH }}
          CI_PIPELINES_TARGET_ENV: ${{ github.event.inputs.env }}
          CI_PIPELINES_STATUS: failure
          CI_PIPELINES_TITLE: "6529 Desktop - Publish job failed ❌"
          CI_PIPELINES_DESCRIPTION: "FLOW: ${{ github.event.inputs.flow }} / ENV: ${{ github.event.inputs.env }} - v${{ github.event.inputs.version }}"
          CI_PIPELINES_SERVICE: desktop
        run: node scripts/notify-ci-wave.mjs

      - name: Summary
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            core.summary
              .addHeading("6529 Desktop Build Complete 🚀")
              .addTable([
                ["FLOW", "${{ github.event.inputs.flow }}"],
                ["Env", "${{ github.event.inputs.env }}"],
                ["Version", "${{ github.event.inputs.version }}"]
              ])
              .write()

  invalidate-cloudfront:
    if: ${{ github.event.inputs.flow == 'Invalidate CloudFront' }}
    name: Invalidate CloudFront
    runs-on: ubuntu-latest
    env:
      SEIZE_6529_COMMAND: "1"
      SEIZE_SECURE_INSTALL: "1"
    steps:
      - name: Check out
        uses: actions/checkout@v3
        with:
          ref: ${{ github.ref_name }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Invalidate CloudFront
        run: |
          if [ "${{ github.event.inputs.env }}" = "Staging" ]; then
            pnpm run invalidate-cf-paths-staging -- --version=${{ github.event.inputs.version }}
          else
            pnpm run invalidate-cf-paths-production -- --version=${{ github.event.inputs.version }}
          fi

      - name: Notify Success
        if: success()
        uses: sarisia/actions-status-discord@v1
        continue-on-error: true
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        with:
          status: success
          title: "6529 Desktop - CloudFront invalidated ✅"
          description: "FLOW: ${{ github.event.inputs.flow }} / ENV: ${{ github.event.inputs.env }} - v${{ github.event.inputs.version }}"
          color: 0x00bfff

      - name: Notify CI wave about CloudFront invalidation success
        if: success()
        continue-on-error: true
        env:
          CI_PIPELINES_ALERT_URL: ${{ vars.CI_PIPELINES_ALERT_URL }}
          CI_PIPELINES_ALERT_SECRET: ${{ secrets.CI_PIPELINES_ALERT_SECRET }}
          CI_PIPELINES_ALERT_API_AUTH: ${{ secrets.CI_PIPELINES_ALERT_API_AUTH }}
          CI_PIPELINES_TARGET_ENV: ${{ github.event.inputs.env }}
          CI_PIPELINES_STATUS: success
          CI_PIPELINES_TITLE: "6529 Desktop - CloudFront invalidated ✅"
          CI_PIPELINES_DESCRIPTION: "FLOW: ${{ github.event.inputs.flow }} / ENV: ${{ github.event.inputs.env }} - v${{ github.event.inputs.version }}"
          CI_PIPELINES_SERVICE: desktop
        run: node scripts/notify-ci-wave.mjs

      - name: Notify Failure
        if: failure()
        uses: sarisia/actions-status-discord@v1
        continue-on-error: true
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        with:
          status: failure
          title: "6529 Desktop - CloudFront invalidation failed ❌"
          description: "FLOW: ${{ github.event.inputs.flow }} / ENV: ${{ github.event.inputs.env }} - v${{ github.event.inputs.version }}"
          content: "<@&1162355330798325861>"
          color: 0xff0000

      - name: Notify CI wave about CloudFront invalidation failure
        if: failure()
        continue-on-error: true
        env:
          CI_PIPELINES_ALERT_URL: ${{ vars.CI_PIPELINES_ALERT_URL }}
          CI_PIPELINES_ALERT_SECRET: ${{ secrets.CI_PIPELINES_ALERT_SECRET }}
          CI_PIPELINES_ALERT_API_AUTH: ${{ secrets.CI_PIPELINES_ALERT_API_AUTH }}
          CI_PIPELINES_TARGET_ENV: ${{ github.event.inputs.env }}
          CI_PIPELINES_STATUS: failure
          CI_PIPELINES_TITLE: "6529 Desktop - CloudFront invalidation failed ❌"
          CI_PIPELINES_DESCRIPTION: "FLOW: ${{ github.event.inputs.flow }} / ENV: ${{ github.event.inputs.env }} - v${{ github.event.inputs.version }}"
          CI_PIPELINES_SERVICE: desktop
        run: node scripts/notify-ci-wave.mjs
